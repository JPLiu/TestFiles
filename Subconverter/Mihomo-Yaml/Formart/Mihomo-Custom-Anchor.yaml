### Date：2025-12-30

### 全局配置
mixed-port: 7890
redir-port: 7892
allow-lan: true
mode: rule
log-level: info
ipv6: false
find-process-mode: strict
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome
geodata-mode: true

