### Date：2025-12-30

### 全局配置
mixed-port: 7890
redir-port: 7892
allow-lan: true
mode: rule
log-level: info
ipv6: false
find-process-mode: strict
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome
geodata-mode: true

### DNS配置
dns:
  enable: true
  prefer-h3: true
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # fake-ip-filter start
  fake-ip-filter:
    - +.+m2m
    - +.$injections.adguard.org
    - +.$local.adguard.org
    - +.+bogon
    - +.+lan
    - +.+local
    - +.+internal
    - +.+localdomain
    - +.home.arpa
    - dns.msftncsi.com
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - xbox.*.microsoft.com
    - "*.xboxlive.com"
    - "*.turn.twilio.com"
    - "*.stun.twilio.com"
    - stun.syncthing.net
    - stun.*
    - "*.sslip.io"
    - "*.nip.io"
  # fake-ip-filter end
  nameserver:
    # - system
    - 223.5.5.5
    - 119.29.29.29
    # - https://dns.alidns.com/dns-query
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
    # AdGuard DNS
    #- 94.140.14.140
    - https://unfiltered.adguard-dns.com/dns-query
    # OpenDns
    #- 208.67.222.222
    - https://doh.opendns.com/dns-query
    # Cloudflare DNS
    #- 1.1.1.1
    - https://cloudflare-dns.com/dns-query
  direct-nameserver:
    # - system
    - 223.5.5.5
    - 119.29.29.29
    # Baidu DNS
    - 180.184.1.1
    # ByteDance DNS
    - 180.76.76.76
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    # - https://dns.alidns.com/dns-query
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
    # AdGuard DNS
    #- 94.140.14.140
    - https://unfiltered.adguard-dns.com/dns-query
    # OpenDns
    #- 208.67.222.222
    - https://doh.opendns.com/dns-query
    # Cloudflare DNS
    #- 1.1.1.1
    - https://cloudflare-dns.com/dns-query

### 域名嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

### Tunnel配置
tun:
  enable: true
  stack: system
  device: Ethernet99
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  mtu: 1500
  # 如果有使用zerotier或者headscale等，需要自己配置排除自己的网段
  # route-exclude-address: ["192.168.110.0/24"]

### 策略组基础配置

# 策略组
proxy-groups:
  - name: 🇭🇰 香港中转
    type: url-test
    proxies:
      - {{proxies:移动转香港}}
      - {{proxies:联通转深港}}
      - {{proxies:电信转香港}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: false
    filter: "香港"

  - name: 🇭🇰 深港专线
    type: url-test
    proxies:
      - {{proxies:深港专线}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: false
    filter: "专线"
    
  - name: 🇭🇰 广港专线
    type: url-test
    proxies:
      - {{proxies:广港专线}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: false
    filter: "专线"

  - name: 🇭🇰 香港测速
    type: url-test
    proxies:
      - {{proxies:香港}}
      - {{proxies:深港}}
      - {{proxies:广港}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: false
    filter: "(香港|深港|广港)"

  - name: 🇨🇳 台湾测速
    type: url-test
    proxies:
      - {{proxies:台湾}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: false
    filter: "台湾"

  - name: 🇯🇵 日本测速
    type: url-test
    proxies:
      - {{proxies:日本}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: false
    filter: "日本"

  - name: 🇺🇸 美国测速
    type: url-test
    proxies:
      - {{proxies:美国}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: false
    filter: "美国"

  - name: 🇺🇳 其他测速
    type: url-test
    proxies:
      - {{proxies:德国}}
      - {{proxies:法国}}
      - {{proxies:英国}}
      - {{proxies:新加坡}}
      - {{proxies:韩国}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: false
    filter: "倍率"

  - name: 🌍 全球测速
    type: url-test
    proxies:
      - {{proxies}}
    url: http://www.gstatic.com/generate_204
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    max-failed-times: 3
    hidden: true
    include-all: true

  - name: 🔰 节点选择
    type: select
    proxies:
      - 🇭🇰 香港中转
      - 🇭🇰 深港专线
      - 🇭🇰 广港专线
      - 🇯🇵 日本测速
      - 🇺🇸 美国测速
      - 🇨🇳 台湾测速
      - 🇺🇳 其他测速
      - 🌍 全球测速
      - 🚀 手选节点
      - DIRECT
    url: http://www.gstatic.com/generate_204
    disable-udp: false
    hidden: false
    include-all: false

  - name: 📺 国内媒体
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择
      - 🇭🇰 香港中转
      - 🇭🇰 深港专线
      - 🇭🇰 广港专线
      - 🇨🇳 台湾测速
    url: http://www.gstatic.com/generate_204
    disable-udp: false
    hidden: false
    include-all: false

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT
    url: http://www.gstatic.com/generate_204
    disable-udp: false
    hidden: false
    include-all: false

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🔰 节点选择
    url: http://www.gstatic.com/generate_204
    disable-udp: false
    hidden: false
    include-all: false

  - name: 🌍 全球代理
    type: select
    proxies:
      - 🔰 节点选择
      - DIRECT
    url: http://www.gstatic.com/generate_204
    disable-udp: false
    hidden: false
    include-all: false

  - name: 🚀 手选节点
    type: select
    proxies:
      - {{proxies}}
    url: http://www.gstatic.com/generate_204
    disable-udp: false
    hidden: false
    include-all: true

