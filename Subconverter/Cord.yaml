### Date：2025-06-14
# 参考资料：
# https://github.com/yyhhyyyyyy/selfproxy/tree/main/Mihomo
# https://clash-meta.gitbook.io/clash.meta-wiki-older/example/ex1
# https://www.aloxaf.com/2025/04/how_to_use_geosite/
# DNS 参考：https://www.ip.cn/dns.html

### 全局配置
mixed-port: 7890
redir-port: 7892
allow-lan: true
mode: rule
log-level: info
ipv6: false
find-process-mode: strict
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

external-controller: 127.0.0.1:9090
external-ui: Dashboard
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
secret: ""

geodata-mode: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite-lite.dat"
#  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
geo-auto-update: true
geo-update-interval: 360

profile:
  store-selected: true
  store-fake-ip: true

### DNS配置
dns:
  enable: true
  prefer-h3: true
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # fake-ip-filter start
  fake-ip-filter:
    - +.+m2m
    - +.$injections.adguard.org
    - +.$local.adguard.org
    - +.+bogon
    - +.+lan
    - +.+local
    - +.+internal
    - +.+localdomain
    - +.home.arpa
    - dns.msftncsi.com
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - xbox.*.microsoft.com
    - "*.xboxlive.com"
    - "*.turn.twilio.com"
    - "*.stun.twilio.com"
    - stun.syncthing.net
    - stun.*
    - "*.sslip.io"
    - "*.nip.io"
  # fake-ip-filter end
  nameserver:
    # - system
    - 223.5.5.5
    - 119.29.29.29
    - 208.67.222.222
    - 94.140.14.140
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    # - system
    - 223.5.5.5
    - 119.29.29.29
    - 180.184.1.1
    - 180.76.76.76
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 208.67.222.222
    - 94.140.14.140
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

### 域名嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

### Tunnel配置
tun:
  enable: true
  stack: system
  device: Ethernet99
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  mtu: 1500
  # 如果有使用zerotier或者headscale等，需要自己配置排除自己的网段
  # route-exclude-address: ["192.168.110.0/24"]

### 订阅基础配置 [每天更新一次订阅节点，每 180 秒一次健康检查]
NodeParam: &NodeParam {type: http, interval: 86400, health-check: {enable: true, url: 'http://connectivitycheck.platform.hicloud.com/generate_204', interval: 180}}

# 订阅合集
proxy-providers:
  Node:
    url: ''
    <<: *NodeParam
    path: './Cord/Providers.yaml'

# 节点筛选
# 按地区筛选
FilterHKMax: &FilterHKMax '(香港|深港).*倍率:2'
FilterHKMid: &FilterHKMid '(香港|深港).*倍率:1'
FilterHKMin: &FilterHKMin '(香港|深港).*倍率:0'
FilterTW: &FilterTW '台湾'
FilterJP: &FilterJP '日本'
FilterUS: &FilterUS '美国'
FilterOthers: &FilterOthers '^(?!.*(香港|台湾|日本|美国)).*$'
FilterAll: &FilterAll '.*'

### 策略组基础配置
# 手动选择
Select: &Select {type: select, url: 'http://connectivitycheck.platform.hicloud.com/generate_204', disable-udp: false, hidden: false, include-all: true}
# 自动选择 [每 300 秒一次惰性健康检查，容差 50ms，时延超过 2 秒判定为失败，失败 3 次自动触发健康检查]
UrlTest: &UrlTest {type: url-test, url: 'http://connectivitycheck.platform.hicloud.com/generate_204', interval: 300, lazy: true, tolerance: 50, timeout: 2000, disable-udp: false, max-failed-times: 3, hidden: true, include-all: true}

# 策略组
proxy-groups:
  - {name: 🔰 节点选择, type: select, proxies: [🇭🇰 香港低倍, 🇭🇰 香港中倍, 🇭🇰 香港高倍, 🇯🇵 日本测速, 🇺🇸 美国测速, 🇨🇳 台湾测速, 🇺🇳 其他测速, 🚀 手选节点, DIRECT], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 📺 国内媒体, type: select, proxies: [DIRECT, 🔰 节点选择, 🇭🇰 香港低倍, 🇭🇰 香港中倍, 🇭🇰 香港高倍, 🇨🇳 台湾测速], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🔰 节点选择, DIRECT], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 🎯 全球直连, type: select, proxies: [DIRECT, 🔰 节点选择], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 🌍 全球代理, type: select, proxies: [🔰 节点选择, DIRECT], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 🇭🇰 香港限定, type: select, proxies: [🇭🇰 香港低倍, 🇭🇰 香港中倍, 🇭🇰 香港高倍, 🔰 节点选择, DIRECT], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 🇨🇳 台湾限定, type: select, proxies: [🇨🇳 台湾测速, 🔰 节点选择, DIRECT], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 🇯🇵 日本限定, type: select, proxies: [🇯🇵 日本测速, 🔰 节点选择, DIRECT], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 🇺🇸 美国限定, type: select, proxies: [🇺🇸 美国测速, 🔰 节点选择, DIRECT], url: http://connectivitycheck.platform.hicloud.com/generate_204}
  - {name: 🛑 全球拦截, type: select, proxies: [REJECT, DIRECT, 🔰 节点选择], url: http://connectivitycheck.platform.hicloud.com/generate_204}

  - {name: 🇭🇰 香港低倍, <<: *UrlTest, filter: *FilterHKMin}
  - {name: 🇭🇰 香港中倍, <<: *UrlTest, filter: *FilterHKMid}
  - {name: 🇭🇰 香港高倍, <<: *UrlTest, filter: *FilterHKMax}
  - {name: 🇨🇳 台湾测速, <<: *UrlTest, filter: *FilterTW}
  - {name: 🇯🇵 日本测速, <<: *UrlTest, filter: *FilterJP}
  - {name: 🇺🇸 美国测速, <<: *UrlTest, filter: *FilterUS}
  - {name: 🇺🇳 其他测速, <<: *UrlTest, filter: *FilterOthers}
 
  - {name: 🚀 手选节点, <<: *Select, filter: *FilterAll}
 
