### 域名嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

### Tunnel配置
tun:
  enable: true
  stack: system
  device: Ethernet99
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  mtu: 1500
  # 如果有使用zerotier或者headscale等，需要自己配置排除自己的网段
  # route-exclude-address: ["192.168.110.0/24"]

### 策略组基础配置

# 策略组
proxy-groups:
  - &pg-url-test { type: url-test, url: http://www.gstatic.com/generate_204, interval: 300, lazy: true, tolerance: 50, timeout: 2000, disable-udp: false, max-failed-times: 3, hidden: true, include-all: false }
  - &pg-select { type: select, url: http://www.gstatic.com/generate_204, disable-udp: false, hidden: false, include-all: false }

  - name: "🇭🇰 香港中转"
    <<: *pg-url-test
    proxies: [ "{{proxies:移动转香港}}", "{{proxies:联通转深港}}", "{{proxies:电信转香港}}" ]

  - name: "🇭🇰 深港专线"
    <<: *pg-url-test
    proxies: [ "{{proxies:深港专线}}" ]

  - name: "🇭🇰 广港专线"
    <<: *pg-url-test
    proxies: [ "{{proxies:广港专线}}" ]

  - name: "🇭🇰 香港测速"
    <<: *pg-url-test
    proxies: [ "{{proxies:香港}}", "{{proxies:深港}}", "{{proxies:广港}}" ]

  - name: "🇨🇳 台湾测速"
    <<: *pg-url-test
    proxies: [ "{{proxies:台湾}}" ]

  - name: "🇯🇵 日本测速"
    <<: *pg-url-test
    proxies: [ "{{proxies:日本}}" ]

  - name: "🇺🇸 美国测速"
    <<: *pg-url-test
    proxies: [ "{{proxies:美国}}" ]

  - name: "🇺🇳 其他测速"
    <<: *pg-url-test
    proxies: [ "{{proxies:德国}}", "{{proxies:法国}}", "{{proxies:英国}}", "{{proxies:新加坡}}" ]

  - name: "🌍 全球测速"
    <<: *pg-url-test
    proxies: [ "{{proxies}}" ]

  - name: "🔰 节点选择"
    <<: *pg-select
    proxies: [ "🇭🇰 香港中转", "🇭🇰 深港专线", "🇭🇰 广港专线", "🇯🇵 日本测速", "🇺🇸 美国测速", "🇨🇳 台湾测速", "🇺🇳 其他测速", "🌍 全球测速", "🚀 手选节点", "DIRECT" ]

  - name: "📺 国内媒体"
    <<: *pg-select
    proxies: [ "DIRECT", "🔰 节点选择", "🇭🇰 香港中转", "🇭🇰 深港专线", "🇭🇰 广港专线", "🇨🇳 台湾测速" ]

  - name: "🐟 漏网之鱼"
    <<: *pg-select
    proxies: [ "🔰 节点选择", "DIRECT" ]

  - name: "🎯 全球直连"
    <<: *pg-select
    proxies: [ "DIRECT", "🔰 节点选择" ]

  - name: "🌍 全球代理"
    <<: *pg-select
    proxies: [ "🔰 节点选择", "DIRECT" ]

  - name: "🚀 手选节点"
    <<: *pg-select
    proxies: [ "{{proxies}}" ]

# 订阅规则
